<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main book/document -->
  <g transform="translate(150, 80)">
    <!-- Book cover -->
    <rect x="0" y="0" width="300" height="400" rx="20" fill="url(#gradient1)" opacity="0.9"/>

    <!-- Pages effect -->
    <rect x="10" y="10" width="280" height="380" rx="15" fill="white" opacity="0.1"/>
    <rect x="20" y="20" width="260" height="360" rx="10" fill="white" opacity="0.2"/>

    <!-- Content lines -->
    <rect x="50" y="80" width="200" height="8" rx="4" fill="white" opacity="0.6"/>
    <rect x="50" y="110" width="180" height="8" rx="4" fill="white" opacity="0.6"/>
    <rect x="50" y="140" width="190" height="8" rx="4" fill="white" opacity="0.6"/>
    <rect x="50" y="170" width="160" height="8" rx="4" fill="white" opacity="0.6"/>

    <rect x="50" y="220" width="200" height="8" rx="4" fill="white" opacity="0.6"/>
    <rect x="50" y="250" width="170" height="8" rx="4" fill="white" opacity="0.6"/>
    <rect x="50" y="280" width="190" height="8" rx="4" fill="white" opacity="0.6"/>
  </g>

  <!-- AI Brain icon -->
  <g transform="translate(80, 150)">
    <circle cx="40" cy="40" r="35" fill="url(#gradient2)" opacity="0.9"/>
    <circle cx="25" cy="30" r="6" fill="white"/>
    <circle cx="55" cy="30" r="6" fill="white"/>
    <path d="M 25 50 Q 40 60 55 50" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Gear/Settings icon -->
  <g transform="translate(470, 380)">
    <circle cx="40" cy="40" r="30" fill="url(#gradient3)" opacity="0.9"/>
    <circle cx="40" cy="40" r="15" fill="white" opacity="0.3"/>
    <rect x="35" y="10" width="10" height="20" rx="3" fill="url(#gradient3)"/>
    <rect x="35" y="50" width="10" height="20" rx="3" fill="url(#gradient3)"/>
    <rect x="10" y="35" width="20" height="10" rx="3" fill="url(#gradient3)"/>
    <rect x="50" y="35" width="20" height="10" rx="3" fill="url(#gradient3)"/>
  </g>

  <!-- Sparkles/Stars -->
  <g transform="translate(100, 420)">
    <circle cx="0" cy="0" r="8" fill="url(#gradient4)" opacity="0.8"/>
    <circle cx="40" cy="-20" r="6" fill="url(#gradient4)" opacity="0.7"/>
    <circle cx="20" cy="30" r="5" fill="url(#gradient4)" opacity="0.6"/>
  </g>

  <g transform="translate(480, 120)">
    <circle cx="0" cy="0" r="10" fill="url(#gradient2)" opacity="0.7"/>
    <circle cx="-25" cy="25" r="7" fill="url(#gradient2)" opacity="0.6"/>
    <circle cx="20" cy="35" r="6" fill="url(#gradient2)" opacity="0.5"/>
  </g>

  <!-- Arrow flow -->
  <g transform="translate(200, 500)" opacity="0.6">
    <path d="M 0 0 Q 50 -20 100 0" stroke="url(#gradient3)" stroke-width="6" fill="none" stroke-linecap="round"/>
    <polygon points="100,0 90,-8 90,8" fill="url(#gradient3)"/>
    <path d="M 100 0 Q 150 20 200 0" stroke="url(#gradient4)" stroke-width="6" fill="none" stroke-linecap="round"/>
    <polygon points="200,0 190,-8 190,8" fill="url(#gradient4)"/>
  </g>
</svg>
